[Unit]
Description=Power Guard daemon
Documentation=https://upower.freedesktop.org/
After=network.target

[Service]
Type=simple
User=root
Group=root
WorkingDirectory=/
Environment=POWER_SUSPEND_THRESHOLD=5
Environment=POWER_SHUTDOWN_THRESHOLD=3
Environment=POWER_POLL_INTERVAL=0
Environment=POWER_ACTION_COOLDOWN=2m
Environment=POWER_SUSPEND_RETRIES=3
Environment=POWER_SUSPEND_RETRY_DELAY=2s
Environment=POWER_SHUTDOWN_RETRIES=4
Environment=POWER_SHUTDOWN_RETRY_DELAY=1s
Environment=POWER_EMERGENCY_POWEROFF=true

# Advanced sandboxing/security
ProtectSystem=full
ProtectHome=yes
NoNewPrivileges=yes
PrivateTmp=yes

# Resource limits
MemoryMax=50M
CPUQuota=10%

ExecStart=/usr/local/bin/go-power-guardian
Restart=on-failure

[Install]
WantedBy=multi-user.target